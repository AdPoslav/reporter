<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background circle -->
  <circle cx="16" cy="16" r="16" fill="#3B82F6"/>
  <!-- clock face -->
  <circle cx="16" cy="16" r="11" fill="#fff" opacity=".15"/>
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#fff" stroke-width="1.5"/>
  <!-- hour ticks -->
  <line x1="16" y1="7"  x2="16" y2="8.5"  stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="23.5" x2="16" y2="25" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7"  y1="16" x2="8.5" y2="16"  stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.5" y1="16" x2="25" y2="16" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- hour hand (pointing ~10) -->
  <line x1="16" y1="16" x2="11.5" y2="11" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- minute hand (pointing ~2) -->
  <line x1="16" y1="16" x2="20.5" y2="10.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#fff"/>
</svg>
